# Redis state store backing the DeepAgents scratchpad/virtual filesystem
# and the Dapr Workflow engine's actor state (workflow checkpoints).
#
# Named "agent-memory" by Diagrid's component-discovery convention
# (see diagrid.agent.core.discovery.discover_components).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: agent-memory
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: localhost:6379
    - name: redisPassword
      value: ""
    - name: actorStateStore
      value: "true"
