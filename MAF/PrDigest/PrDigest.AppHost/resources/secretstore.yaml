apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: local-secret-store
spec:
  type: secretstores.local.file
  version: v1
  metadata:
  # Path is resolved relative to the daprd working directory (the AppHost
  # project folder, which is also where the `resources` path resolves from).
  - name: secretsFile
    value: secrets.json
